name: Morning update and Pages deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "5 22 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Morning update
        run: npm run morning
        env:
          PRICE_CSV_URL: ${{ secrets.PRICE_CSV_URL }}
          DISCLOSURE_CSV_URL: ${{ secrets.DISCLOSURE_CSV_URL }}
          EDINET_FACTS_CSV_URL: ${{ secrets.EDINET_FACTS_CSV_URL }}

      - name: Build Pages files
        run: npm run pages:build

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  notify:
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name != 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Prepare report
        run: npm run morning
        env:
          PRICE_CSV_URL: ${{ secrets.PRICE_CSV_URL }}
          DISCLOSURE_CSV_URL: ${{ secrets.DISCLOSURE_CSV_URL }}
          EDINET_FACTS_CSV_URL: ${{ secrets.EDINET_FACTS_CSV_URL }}

      - name: Notify Discord
        run: npm run notify:discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PAGES_URL: https://sensin0.github.io/candidate-stock-assist/
