name: Morning update and Pages deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "55 21 * * *"
    - cron: "5 22 * * *"
    - cron: "25 22 * * *"

permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Morning update
        run: npm run morning
        env:
          PRICE_CSV_URL: ${{ secrets.PRICE_CSV_URL }}
          STOCK_MASTER_CSV_URL: ${{ secrets.STOCK_MASTER_CSV_URL }}
          DISCLOSURE_CSV_URL: ${{ secrets.DISCLOSURE_CSV_URL }}
          EDINET_FACTS_CSV_URL: ${{ secrets.EDINET_FACTS_CSV_URL }}
          WATCHLIST_CSV_URL: ${{ secrets.WATCHLIST_CSV_URL }}

      - name: Production readiness check
        run: npm run production:check
        env:
          PRICE_CSV_URL: ${{ secrets.PRICE_CSV_URL }}
          STOCK_MASTER_CSV_URL: ${{ secrets.STOCK_MASTER_CSV_URL }}
          DISCLOSURE_CSV_URL: ${{ secrets.DISCLOSURE_CSV_URL }}
          EDINET_FACTS_CSV_URL: ${{ secrets.EDINET_FACTS_CSV_URL }}
          WATCHLIST_CSV_URL: ${{ secrets.WATCHLIST_CSV_URL }}

      - name: Research reports
        run: npm run research:morning

      - name: Refresh morning report after research
        run: npm run report

      - name: Build Pages files
        run: npm run pages:build

      - name: Configure Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  notify:
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name != 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Prepare data
        run: npm run morning
        env:
          PRICE_CSV_URL: ${{ secrets.PRICE_CSV_URL }}
          STOCK_MASTER_CSV_URL: ${{ secrets.STOCK_MASTER_CSV_URL }}
          DISCLOSURE_CSV_URL: ${{ secrets.DISCLOSURE_CSV_URL }}
          EDINET_FACTS_CSV_URL: ${{ secrets.EDINET_FACTS_CSV_URL }}
          WATCHLIST_CSV_URL: ${{ secrets.WATCHLIST_CSV_URL }}

      - name: Prepare research reports
        run: npm run research:morning

      - name: Refresh report after research
        run: npm run report

      - name: Wait until 7:10 JST
        if: github.event_name == 'schedule'
        run: |
          today="$(TZ=Asia/Tokyo date +%F)"
          target="$(TZ=Asia/Tokyo date -d "$today 07:10:00" +%s)"
          now="$(date +%s)"
          wait_seconds=$((target - now))
          if [ "$wait_seconds" -gt 0 ]; then
            echo "Waiting ${wait_seconds}s until 7:10 JST"
            sleep "$wait_seconds"
          else
            echo "Already past 7:10 JST; sending now"
          fi

      - name: Check today's scheduled notification
        id: duplicate
        if: github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          import urllib.request
          from datetime import datetime
          from zoneinfo import ZoneInfo

          repo = os.environ["REPO"]
          run_id = int(os.environ["RUN_ID"])
          token = os.environ["GH_TOKEN"]
          today = datetime.now(ZoneInfo("Asia/Tokyo")).date().isoformat()
          url = f"https://api.github.com/repos/{repo}/actions/workflows/morning-pages.yml/runs?event=schedule&per_page=30"
          request = urllib.request.Request(
              url,
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "User-Agent": "candidate-stock-assist",
              },
          )
          data = json.loads(urllib.request.urlopen(request, timeout=20).read().decode("utf-8"))
          already_sent = False
          for run in data.get("workflow_runs", []):
              if int(run["id"]) == run_id or run.get("conclusion") != "success":
                  continue
              created = datetime.fromisoformat(run["created_at"].replace("Z", "+00:00")).astimezone(ZoneInfo("Asia/Tokyo"))
              if created.date().isoformat() == today:
                  already_sent = True
                  break
          print(f"already_sent={'true' if already_sent else 'false'}")
          PY

      - name: Notify Discord
        if: steps.duplicate.outputs.already_sent != 'true'
        run: npm run notify:discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PAGES_URL: https://sensin0.github.io/candidate-stock-assist/
