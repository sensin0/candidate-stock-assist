name: Morning update and Pages deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "10 22 * * *"

permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Morning update
        run: npm run morning
        env:
          PRICE_CSV_URL: ${{ secrets.PRICE_CSV_URL }}
          STOCK_MASTER_CSV_URL: ${{ secrets.STOCK_MASTER_CSV_URL }}
          DISCLOSURE_CSV_URL: ${{ secrets.DISCLOSURE_CSV_URL }}
          EDINET_FACTS_CSV_URL: ${{ secrets.EDINET_FACTS_CSV_URL }}
          WATCHLIST_CSV_URL: ${{ secrets.WATCHLIST_CSV_URL }}

      - name: Production readiness check
        run: npm run production:check
        env:
          PRICE_CSV_URL: ${{ secrets.PRICE_CSV_URL }}
          STOCK_MASTER_CSV_URL: ${{ secrets.STOCK_MASTER_CSV_URL }}
          DISCLOSURE_CSV_URL: ${{ secrets.DISCLOSURE_CSV_URL }}
          EDINET_FACTS_CSV_URL: ${{ secrets.EDINET_FACTS_CSV_URL }}
          WATCHLIST_CSV_URL: ${{ secrets.WATCHLIST_CSV_URL }}

      - name: Research reports
        run: npm run research:morning

      - name: Refresh morning report after research
        run: npm run report

      - name: Build Pages files
        run: npm run pages:build

      - name: Configure Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  notify:
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name != 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Prepare data
        run: npm run morning
        env:
          PRICE_CSV_URL: ${{ secrets.PRICE_CSV_URL }}
          STOCK_MASTER_CSV_URL: ${{ secrets.STOCK_MASTER_CSV_URL }}
          DISCLOSURE_CSV_URL: ${{ secrets.DISCLOSURE_CSV_URL }}
          EDINET_FACTS_CSV_URL: ${{ secrets.EDINET_FACTS_CSV_URL }}
          WATCHLIST_CSV_URL: ${{ secrets.WATCHLIST_CSV_URL }}

      - name: Prepare research reports
        run: npm run research:morning

      - name: Refresh report after research
        run: npm run report

      - name: Restore buy-candidate notification state
        uses: actions/cache/restore@v4
        with:
          path: .notification-state
          key: buy-candidates-${{ github.run_id }}
          restore-keys: |
            buy-candidates-

      - name: Check new buy candidates
        id: buy_candidates
        run: npm run notify:check-buy

      - name: Save buy-candidate notification state
        uses: actions/cache/save@v4
        if: always()
        with:
          path: .notification-state
          key: buy-candidates-${{ github.run_id }}

      - name: Notify Discord
        if: steps.buy_candidates.outputs.has_new == 'true'
        run: npm run notify:discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PAGES_URL: https://sensin0.github.io/candidate-stock-assist/
